<meta charset="UTF-8"/>

<title>Which State Am I? – India Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --saffron:#FF6B2B;--saffron-light:#FF8C55;--saffron-pale:#FFF3ED;
  --green:#138808;--green-light:#1BA80A;--green-pale:#EDFFF0;
  --navy:#002366;--navy-light:#1A3A7A;
  --gold:#F5A623;--gold-light:#FFD166;
  --white:#FFFFFF;--off:#F9F5F0;
  --gray-100:#F3F0EB;--gray-200:#E8E2D9;--gray-300:#C8BFB3;--gray-500:#8A7F74;--gray-700:#4A4540;--gray-900:#1A1714;
  --radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,.1);--shadow-lg:0 12px 48px rgba(0,0,0,.18);
}
[data-dark]{
  --white:#1A1714;--off:#221E1B;--gray-100:#2A2520;--gray-200:#332E28;--gray-300:#4A4540;--gray-500:#8A7F74;--gray-700:#C8BFB3;--gray-900:#F9F5F0;
  --saffron-pale:#2A1A10;--green-pale:#0D1F0E;--navy:#3A5CA8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:var(--off);color:var(--gray-900);transition:background .3s,color .3s;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 8px;flex-wrap:wrap;gap:8px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 2px 12px rgba(255,107,43,.3)}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--saffron),var(--navy));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--gray-100);border:none;border-radius:10px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;color:var(--gray-900)}
.icon-btn:hover{background:var(--gray-200);transform:scale(1.05)}
/* Score strip */
.score-strip{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.score-card{background:var(--white);border-radius:var(--radius-sm);padding:10px 16px;flex:1;min-width:90px;text-align:center;box-shadow:var(--shadow)}
.score-val{font-size:22px;font-weight:800;color:var(--saffron)}
.score-lbl{font-size:10px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px}
/* Difficulty */
.diff-row{display:flex;gap:8px;margin:8px 0}
.diff-btn{flex:1;padding:8px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);cursor:pointer;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--gray-500);transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.diff-btn.active-easy{border-color:#22C55E;background:#F0FDF4;color:#166534}
.diff-btn.active-medium{border-color:var(--gold);background:#FFFBEB;color:#92400E}
.diff-btn.active-hard{border-color:#EF4444;background:#FFF5F5;color:#991B1B}
/* Timer */
.timer-wrap{position:relative;height:8px;background:var(--gray-200);border-radius:99px;margin:12px 0;overflow:hidden}
.timer-bar{height:100%;border-radius:99px;transition:width .9s linear,background .3s;background:linear-gradient(90deg,var(--green),var(--gold),var(--saffron))}
/* Question card */
.q-card{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-lg);margin:12px 0;animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.q-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.q-num{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:1px}
.q-progress{font-size:11px;color:var(--gray-500)}
.clue-section{background:linear-gradient(135deg,var(--saffron-pale),var(--green-pale));border-radius:var(--radius-sm);padding:20px;margin-bottom:16px;border-left:4px solid var(--saffron)}
.clue-label{font-size:10px;font-weight:700;color:var(--saffron);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.clue-text{font-size:15px;font-weight:500;color:var(--gray-900);line-height:1.6}
.clue-icon{font-size:28px;margin-bottom:8px}
.more-clue-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:6px 14px;background:var(--white);border:1px solid var(--gray-200);border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;color:var(--saffron);transition:all .2s;font-family:'Poppins',sans-serif}
.more-clue-btn:hover{background:var(--saffron-pale);border-color:var(--saffron)}
/* Options */
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
@media(max-width:480px){.options-grid{grid-template-columns:1fr}}
.opt-btn{padding:14px 16px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);cursor:pointer;font-family:'Poppins',sans-serif;font-size:14px;font-weight:500;color:var(--gray-900);transition:all .22s;text-align:left;display:flex;align-items:center;gap:10px;line-height:1.3}
.opt-btn:hover:not(:disabled){border-color:var(--saffron);background:var(--saffron-pale);transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,107,43,.15)}
.opt-btn.correct{border-color:var(--green) !important;background:var(--green-pale) !important;color:var(--green) !important;font-weight:700}
.opt-btn.wrong{border-color:#EF4444 !important;background:#FFF5F5 !important;color:#EF4444 !important}
.opt-btn:disabled{cursor:default}
.opt-letter{width:28px;height:28px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray-500);flex-shrink:0;transition:all .2s}
.opt-btn.correct .opt-letter{background:var(--green);color:#fff}
.opt-btn.wrong .opt-letter{background:#EF4444;color:#fff}
/* Feedback */
.feedback{padding:14px 18px;border-radius:var(--radius-sm);margin:12px 0;animation:fadeIn .3s ease;font-size:13px;line-height:1.6}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.feedback.correct{background:var(--green-pale);border:1px solid var(--green);color:#166534}
.feedback.wrong{background:#FFF5F5;border:1px solid #FCA5A5;color:#7F1D1D}
.fun-fact{margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08);font-style:italic;color:var(--gray-700)}
/* Progress bar */
.prog-bar-wrap{background:var(--gray-200);border-radius:99px;height:5px;margin:12px 0}
.prog-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--saffron),var(--gold));transition:width .4s ease}
/* Screens */
.screen{animation:fadeIn .4s ease}
/* Start screen */
.start-card{background:var(--white);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow-lg);text-align:center;margin:24px 0}
.start-hero{font-size:64px;margin-bottom:16px}
.start-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;color:var(--saffron);margin-bottom:8px}
.start-sub{color:var(--gray-500);font-size:14px;line-height:1.6;max-width:420px;margin:0 auto 24px}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0;text-align:left}
@media(max-width:480px){.features-grid{grid-template-columns:1fr}}
.feat-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--gray-100);border-radius:var(--radius-sm)}
.feat-icon{font-size:20px;flex-shrink:0}
.feat-text{font-size:12px;color:var(--gray-700);font-weight:500}
/* Buttons */
.btn{padding:13px 28px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;transition:all .22s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--saffron),#FF4500);color:#fff;box-shadow:0 4px 18px rgba(255,107,43,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,107,43,.45)}
.btn-secondary{background:var(--gray-100);color:var(--gray-700)}
.btn-secondary:hover{background:var(--gray-200)}
.btn-green{background:linear-gradient(135deg,var(--green),#0F7A0A);color:#fff;box-shadow:0 4px 18px rgba(19,136,8,.3)}
/* End screen */
.end-card{background:var(--white);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow-lg);text-align:center;margin:16px 0}
.result-emoji{font-size:72px;margin-bottom:12px}
.result-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:800;margin-bottom:8px}
.result-score-big{font-size:52px;font-weight:800;color:var(--saffron);line-height:1}
.result-score-sub{font-size:14px;color:var(--gray-500);margin-bottom:20px}
.result-msg{color:var(--gray-700);font-size:14px;line-height:1.7;max-width:400px;margin:0 auto 20px}
/* Badges */
.badges-wrap{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:20px 0}
.badge{padding:10px 18px;border-radius:30px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.badge-earned{background:linear-gradient(135deg,var(--gold),var(--saffron));color:#fff;box-shadow:0 4px 12px rgba(245,166,35,.4)}
.badge-locked{background:var(--gray-100);color:var(--gray-300)}
/* Leaderboard */
.lb-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin:12px 0}
.lb-title{font-weight:700;font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:6px;background:var(--gray-100)}
.lb-rank{width:24px;height:24px;border-radius:50%;background:var(--gray-200);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray-500);flex-shrink:0}
.lb-rank.gold{background:var(--gold);color:#fff}
.lb-rank.silver{background:#A8A8A8;color:#fff}
.lb-rank.bronze{background:#CD7F32;color:#fff}
.lb-name{flex:1;font-size:13px;font-weight:600}
.lb-score{font-size:13px;font-weight:700;color:var(--saffron)}
.lb-diff{font-size:10px;color:var(--gray-500);background:var(--gray-200);padding:2px 6px;border-radius:4px}
.name-input-wrap{display:flex;gap:8px;margin-bottom:16px}
.name-input{flex:1;padding:10px 14px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);font-family:'Poppins',sans-serif;font-size:14px;background:var(--white);color:var(--gray-900);outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--saffron)}
.divider{height:1px;background:var(--gray-200);margin:16px 0}
.ashoka-wheel{display:inline-block;color:var(--navy);animation:spin 8s linear infinite;font-size:20px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.tag{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:6px}
.tag-monument{background:#EEF2FF;color:#4338CA}
.tag-food{background:#FFF7ED;color:#C2410C}
.tag-festival{background:#FDF4FF;color:#7C3AED}
.tag-lang{background:#F0FDF4;color:#166534}
.tag-dance{background:#FFF1F2;color:#BE123C}
.tag-nature{background:#ECFDF5;color:#065F46}

.skip-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--gray-400,#9CA3AF);font-family:'Poppins',sans-serif;padding:4px 8px;border-radius:6px;transition:color .2s}
.skip-btn:hover{color:var(--saffron)}
</style>
</head>

const BADGES = [
  {id:'explorer',name:'Explorer',icon:'🧭',desc:'Complete your first quiz',condition:(score,total,diff)=>true},
  {id:'culture',name:'Culture Expert',icon:'🎭',desc:'Score 70%+ on Medium or Hard',condition:(score,total,diff)=>score/total>=0.7&&diff!=='easy'},
  {id:'master',name:'India Master',icon:'🏆',desc:'Score 90%+ on Hard difficulty',condition:(score,total,diff)=>score/total>=0.9&&diff==='hard'},
  {id:'speedster',name:'Speedster',icon:'⚡',desc:'Complete quiz with 200s+ time bonus',condition:(score,total,diff,timeBonus)=>timeBonus>=200},
  {id:'perfectionist',name:'Perfectionist',icon:'💯',desc:'Get a perfect score',condition:(score,total,diff)=>score===total},
];

const TIMERS={easy:30,medium:20,hard:12};
const CLUES_BY_DIFF={easy:1,medium:2,hard:3};
const QS_COUNT=10;

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function getOptions(correct,all){
  const others=shuffle(all.filter(s=>s.name!==correct.name)).slice(0,3);
  return shuffle([correct,...others]);
}

function buildQuiz(diff){
  const pool=shuffle(STATES).slice(0,QS_COUNT);
  return pool.map(state=>{
    const clueCount=CLUES_BY_DIFF[diff];
    const clues=shuffle(state.clues).slice(0,Math.min(clueCount,state.clues.length));
    return{state,clues,options:getOptions(state,STATES)};
  });
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let appState={
  screen:'start',// start | quiz | end
  dark:false,
  diff:'medium',
  quiz:[],
  qIndex:0,
  score:0,
  timeBonus:0,
  timeLeft:0,
  timerRef:null,
  answered:null,// null | {correct:bool, chosen:string}
  cluesRevealed:1,
  leaderboard:JSON.parse(localStorage.getItem('wsai_lb')||'[]'),
  playerName:localStorage.getItem('wsai_name')||'',
  earnedBadges:[],
};

function setState(patch){
  Object.assign(appState,typeof patch==='function'?patch(appState):patch);
  render();
}

// ─── TIMER ───────────────────────────────────────────────────────────────────
function startTimer(){
  clearTimer();
  const secs=TIMERS[appState.diff];
  setState({timeLeft:secs});
  appState.timerRef=setInterval(()=>{
    if(appState.answered!==null){clearTimer();return;}
    const t=appState.timeLeft-1;
    if(t<=0){
      clearTimer();
      handleAnswer('__timeout__');
    } else {
      appState.timeLeft=t;
      renderTimerOnly();
    }
  },1000);
}
function clearTimer(){if(appState.timerRef){clearInterval(appState.timerRef);appState.timerRef=null;}}
function renderTimerOnly(){
  const bar=document.getElementById('timer-bar');
  const lbl=document.getElementById('timer-lbl');
  if(!bar||!lbl)return;
  const pct=(appState.timeLeft/TIMERS[appState.diff])*100;
  bar.style.width=pct+'%';
  bar.style.background=pct>60?'linear-gradient(90deg,#22C55E,#86EFAC)':pct>30?'linear-gradient(90deg,#F59E0B,#FCD34D)':'linear-gradient(90deg,#EF4444,#FCA5A5)';
  lbl.textContent=appState.timeLeft+'s';
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function startQuiz(){
  clearTimer();
  const quiz=buildQuiz(appState.diff);
  setState({screen:'quiz',quiz,qIndex:0,score:0,timeBonus:0,answered:null,cluesRevealed:1,earnedBadges:[]});
  setTimeout(startTimer,50);
}

function handleAnswer(chosen){
  clearTimer();
  if(appState.answered!==null)return;
  const q=appState.quiz[appState.qIndex];
  const correct=q.state.name===chosen;
  const bonus=correct?appState.timeLeft:0;
  setState(s=>({
    answered:{correct,chosen},
    score:correct?s.score+1:s.score,
    timeBonus:s.timeBonus+bonus,
  }));
}

function nextQuestion(){
  const next=appState.qIndex+1;
  if(next>=appState.quiz.length){
    // end
    clearTimer();
    const badges=BADGES.filter(b=>b.condition(appState.score,appState.quiz.length,appState.diff,appState.timeBonus));
    setState({screen:'end',earnedBadges:badges});
  } else {
    setState({qIndex:next,answered:null,cluesRevealed:1});
    setTimeout(startTimer,50);
  }
}

function revealClue(){
  const q=appState.quiz[appState.qIndex];
  if(appState.cluesRevealed<q.clues.length){
    setState(s=>({cluesRevealed:s.cluesRevealed+1}));
  }
}

function saveScore(){
  const name=appState.playerName.trim()||'Anonymous';
  const entry={name,score:appState.score,total:appState.quiz.length,diff:appState.diff,date:new Date().toLocaleDateString(),timeBonus:appState.timeBonus};
  const lb=[entry,...appState.leaderboard].sort((a,b)=>b.score-a.score||b.timeBonus-a.timeBonus).slice(0,10);
  localStorage.setItem('wsai_lb',JSON.stringify(lb));
  localStorage.setItem('wsai_name',name);
  setState({leaderboard:lb,playerName:name});
}

function toggleDark(){
  const d=!appState.dark;
  document.documentElement.setAttribute('data-dark',d?'1':'');
  if(!d)document.documentElement.removeAttribute('data-dark');
  setState({dark:d});
}

      <div class="score-card"><div class="score-val" style="color:var(--green)">${appState.qIndex+1}</div><div class="score-lbl">Question</div></div>
      <div class="score-card"><div class="score-val" style="color:var(--gold)">${appState.timeBonus}</div><div class="score-lbl">Time Bonus</div></div>
      <div class="score-card"><div class="score-val" id="timer-lbl" style="color:${appState.timeLeft<=5?'#EF4444':'var(--navy)'}">${appState.timeLeft}s</div><div class="score-lbl">Time Left</div></div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${((appState.qIndex)/appState.quiz.length)*100}%"></div></div>
    <div class="timer-wrap"><div class="timer-bar" id="timer-bar" style="width:${timePct}%;background:${timeColor}"></div></div>
    <div class="q-card">
      <div class="q-meta">
        <div class="q-num">Question ${appState.qIndex+1} of ${appState.quiz.length}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${appState.diff==='easy'?'#DCFCE7':appState.diff==='medium'?'#FEF9C3':'#FEE2E2'};color:${appState.diff==='easy'?'#166534':appState.diff==='medium'?'#713F12':'#991B1B'};font-weight:700;text-transform:uppercase;letter-spacing:.5px">${appState.diff}</span>
        </div>
      </div>
      <div style="font-size:18px;font-weight:700;margin-bottom:12px;color:var(--gray-900)">Which Indian state am I? 🤔</div>
      ${revealed.map((clue,i)=>`
        <div class="clue-section" style="${i>0?'margin-top:10px':''}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div class="clue-icon" style="font-size:24px;margin-bottom:0">${clue.icon}</div>
            <div>
              <div class="clue-label">${i===0?'Clue 1':`Clue ${i+1}`}</div>
              <span class="tag tag-${clue.tag}">${clue.type}</span>
            </div>
          </div>
          <div class="clue-text">${clue.text}</div>
        </div>
      `).join('')}
      ${canReveal?`<button class="more-clue-btn" id="btn-reveal">💡 Reveal another clue <span style="font-size:10px;color:var(--gray-400)">(${q.clues.length-appState.cluesRevealed} left)</span></button>`:''}
      <div class="options-grid" style="margin-top:16px">
        ${q.options.map((opt,i)=>{
          let cls='opt-btn';
          if(appState.answered){
            if(opt.name===q.state.name)cls+=' correct';
            else if(opt.name===appState.answered.chosen&&!appState.answered.correct)cls+=' wrong';
          }
          return `<button class="opt-btn ${appState.answered&&opt.name===q.state.name?'correct':appState.answered&&opt.name===appState.answered.chosen&&!appState.answered.correct?'wrong':''}" 
            data-answer="${opt.name}" ${appState.answered?'disabled':''}>
            <div class="opt-letter">${appState.answered&&opt.name===q.state.name?'✓':appState.answered&&opt.name===appState.answered.chosen&&!appState.answered.correct?'✗':letters[i]}</div>
            ${opt.name}
          </button>`;
        }).join('')}
      </div>
      ${appState.answered?`
        <div class="feedback ${appState.answered.correct?'correct':'wrong'}">
          ${appState.answered.chosen==='__timeout__'?`⏰ <strong>Time's up!</strong> The answer was <strong>${q.state.name}</strong>.`:
          appState.answered.correct?`✅ <strong>Correct!</strong> That's <strong>${q.state.name}</strong>!`:
          `❌ <strong>Not quite.</strong> The answer was <strong>${q.state.name}</strong>.`}
          <div class="fun-fact">💡 Fun fact: ${q.state.funFact}</div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:12px">
          <button class="btn btn-primary" id="btn-next">
            ${appState.qIndex+1>=appState.quiz.length?'See Results 🎉':'Next Question →'}
          </button>
        </div>
      `:`
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <button class="skip-btn" id="btn-skip">Skip →</button>
          <div style="font-size:11px;color:var(--gray-500)">Select the correct state</div>
        </div>
      `}
    </div>
  `;
}

function renderEnd(){
  const score=appState.score;
  const total=appState.quiz.length;
  const pct=Math.round((score/total)*100);
  const {emoji,title,msg}=getResultMsg(pct);
  const saved=appState.leaderboard.some(e=>e.score===score&&e.diff===appState.diff&&e.timeBonus===appState.timeBonus);
  return `
    <div class="end-card">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title" style="color:var(--saffron)">${title}</div>
      <div class="result-score-big">${score}<span style="font-size:28px;color:var(--gray-300)">/${total}</span></div>
      <div class="result-score-sub">Time Bonus: <strong style="color:var(--gold)">+${appState.timeBonus}s</strong> · ${pct}% accuracy</div>
      <div class="result-msg">${msg}</div>
      <div style="margin:12px 0;padding:14px;background:var(--gray-100);border-radius:var(--radius-sm);display:flex;gap:20px;justify-content:center;flex-wrap:wrap">
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--green)">${score}</div><div style="font-size:11px;color:var(--gray-500)">Correct</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:#EF4444">${total-score}</div><div style="font-size:11px;color:var(--gray-500)">Wrong</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--gold)">${appState.timeBonus}</div><div style="font-size:11px;color:var(--gray-500)">Time Bonus</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--navy)">${pct}%</div><div style="font-size:11px;color:var(--gray-500)">Accuracy</div></div>
      </div>
      <div class="divider"></div>
      <div style="font-weight:700;font-size:13px;margin-bottom:10px">🏅 Your Badges</div>
      <div class="badges-wrap">
        ${BADGES.map(b=>{
          const earned=appState.earnedBadges.find(e=>e.id===b.id);
          return `<div class="badge ${earned?'badge-earned':'badge-locked'}" title="${b.desc}">${b.icon} ${b.name}</div>`;
        }).join('')}
      </div>
      <div class="divider"></div>
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">💾 Save Your Score</div>
      <div class="name-input-wrap">
        <input class="name-input" id="player-name" type="text" maxlength="20" placeholder="Enter your name…" value="${appState.playerName}"/>
        <button class="btn btn-green" id="btn-save">Save</button>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-primary" id="btn-restart" style="flex:1;justify-content:center">🔄 Play Again</button>
        <button class="btn btn-secondary" id="btn-home2" style="flex:1;justify-content:center">🏠 Home</button>
      </div>
    </div>
    ${appState.leaderboard.length>0?`
    <div class="lb-card">
      <div class="lb-title">🏆 Leaderboard</div>
      ${appState.leaderboard.map((e,i)=>`
        <div class="lb-row" style="${e.score===score&&e.diff===appState.diff?'border:1px solid var(--saffron)':''}">
          <div class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div>
          <div class="lb-name">${e.name}</div>
          <div class="lb-diff">${e.diff}</div>
          <div class="lb-score">${e.score}/${e.total}</div>
          <div style="font-size:11px;color:var(--gray-500)">${e.date}</div>
        </div>`).join('')}
    </div>`:''}
  `;
}

function getResultMsg(pct){
  if(pct===100)return{emoji:'🌟',title:'India Master!',msg:'Extraordinary! You got every single answer right. You are a true connoisseur of Indian culture, history, and geography. India would be proud!'};
  if(pct>=90)return{emoji:'🏆',title:'Expert Explorer!',msg:'Outstanding performance! You clearly have deep knowledge of India\'s diverse states, their culture, food, and history. Incredible work!'};
  if(pct>=70)return{emoji:'🎯',title:'Culture Savant!',msg:'Great job! You know India well. A little more study of the northeast and tribal states might make you a perfect scorer next time.'};
  if(pct>=50)return{emoji:'📚',title:'Curious Traveller',msg:'Good effort! India is a vast and complex country. Every quiz teaches you something new about its incredible 5,000-year-old civilization.'};
  if(pct>=30)return{emoji:'🌱',title:'India Discoverer',msg:'You\'re on a journey of discovery! India has 28 states and 8 union territories, each with its own unique identity. Keep exploring!'};
  return{emoji:'🗺️',title:'Start of a Journey',msg:'No worries — India is the world\'s most complex civilizational mosaic. Each question is an invitation to learn something amazing about this incredible land!'};
}

function attachEvents(){
  document.getElementById('btn-dark')?.addEventListener('click',toggleDark);
  document.getElementById('btn-home')?.addEventListener('click',()=>{ clearTimer(); setState({screen:'start'}); });
  document.getElementById('btn-home2')?.addEventListener('click',()=>{ setState({screen:'start'}); });
  document.getElementById('btn-start')?.addEventListener('click',startQuiz);
  document.getElementById('btn-restart')?.addEventListener('click',startQuiz);
  document.getElementById('btn-next')?.addEventListener('click',nextQuestion);
  document.getElementById('btn-reveal')?.addEventListener('click',revealClue);
  document.getElementById('btn-skip')?.addEventListener('click',()=>handleAnswer('__timeout__'));
  document.getElementById('btn-save')?.addEventListener('click',()=>{
    appState.playerName=document.getElementById('player-name')?.value||'Anonymous';
    saveScore();
  });
  document.querySelectorAll('[data-diff]').forEach(btn=>{
    btn.addEventListener('click',()=>setState({diff:btn.dataset.diff}));
  });
  document.querySelectorAll('[data-answer]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(!appState.answered)handleAnswer(btn.dataset.answer);
    });
  });
}

render();
</script>
</body>
</html>
